<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubble - Main</title>
    <!-- Heroicons CDN -->
    <script src="https://unpkg.com/heroicons@2.0.18/24/outline/esm/index.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        :root {
            --primary: #009CFC;
            --secondary: #A0AAFF;
            --accent: #C97FFD;
            --background-light: #f7f8fa;
            --star: #A0AAFF;
            --planet: #C97FFD;
            --text-light: #222;
            --sidebar-bg-light: #f4f7ff;
            --sidebar-border-light: #e0e6f7;
            --sidebar-active-light: #e6f2ff;
            --main-content-light: transparent;
            --background-dark: #181e2a;
            --sidebar-bg-dark: #232a3a;
            --sidebar-border-dark: #2c3550;
            --sidebar-active-dark: #232a3a;
            --text-dark: #f7f8fa;
            --main-content-dark: transparent;
        }
        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        body[data-theme="light"] {
            background: var(--background-light);
            color: var(--text-light);
        }
        body[data-theme="dark"] {
            background: var(--background-dark);
            color: var(--text-dark);
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(circle at 80% 20%, rgba(201,127,253,0.13) 0 8vw, transparent 12vw),
                radial-gradient(circle at 15% 80%, rgba(0,156,252,0.10) 0 5vw, transparent 8vw),
                repeating-radial-gradient(circle at 30% 30%, #a2dbff 0 1px, transparent 2px 100px),
                repeating-radial-gradient(circle at 50% 50%, #A0AAFF 0 1px, transparent 2px 100px),
                repeating-radial-gradient(circle at 30% 30%, #fff 0 1px, transparent 2px 100px),
                repeating-radial-gradient(circle at 50% 50%, rgba(160,170,255,0.08) 0 60px, transparent 62px 100vw);
            opacity: 0.22;
        }
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body[data-theme="dark"] .topbar {
            background: #20263a;
            box-shadow: 0 2px 12px rgba(0,0,0,0.13);
        }
        .hubble-gradient {
            font-family: 'Poppins', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            background: linear-gradient(90deg, #009CFC 0%, #A0AAFF 50%, #C97FFD 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            margin-left: 2.2rem;
            letter-spacing: 2px;
            -webkit-user-select: none;
            user-select: none;
        }
        .profile-area {
            display: flex;
            align-items: center;
            margin-right: 2.2rem;
            gap: 0.7rem;
            position: relative;
        }
        
        .notification-area {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .notification-icon {
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background 0.18s, transform 0.18s;
            position: relative;
        }
        
        .notification-icon:hover {
            background: rgba(0,156,252,0.1);
            transform: scale(1.1);
        }
        
        .notification-icon.has-notifications::after {
            content: '';
            position: absolute;
            top: 0.3rem;
            right: 0.3rem;
            width: 8px;
            height: 8px;
            background: #f44336;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        
        .notification-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            width: 320px;
            max-height: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }
        
        .notification-dropdown.active {
            display: block;
        }
        
        body[data-theme="dark"] .notification-dropdown {
            background: #232a3a;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .notification-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #e0e6f7;
            background: var(--background-light);
        }
        
        .notification-header h4 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        body[data-theme="dark"] .notification-header {
            background: #232a3a;
            border-bottom: 1px solid #2c3550;
        }
        
        .notification-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .notification-item {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #e0e6f7;
            cursor: pointer;
            transition: background 0.18s;
            position: relative;
        }
        
        .notification-item.unread {
            background: rgba(0,156,252,0.05);
            font-weight: 500;
        }
        
        .notification-item.read {
            background: transparent;
            opacity: 0.7;
        }
        
        .notification-item:hover {
            background: rgba(0,156,252,0.1);
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        body[data-theme="dark"] .notification-item {
            border-bottom: 1px solid #2c3550;
        }
        
        body[data-theme="dark"] .notification-item.unread {
            background: rgba(201,127,253,0.1);
        }
        
        body[data-theme="dark"] .notification-item:hover {
            background: rgba(201,127,253,0.15);
        }
        
        .notification-dot {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }
        
        .notification-content {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: var(--text-light);
        }
        
        .notification-message {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        
        .notification-time {
            color: var(--secondary);
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        .notification-view-all {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid var(--sidebar-border);
        }
        
        .view-all-notifications-btn {
            width: 100%;
            padding: 0.6rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.18s;
        }
        
        .view-all-notifications-btn:hover {
            background: var(--accent);
        }
        
        .all-notifications-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 0;
        }
        
        body[data-theme="dark"] .notification-content {
            color: #f7f8fa;
        }
        
        .notification-action {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }
        body[data-theme="dark"] .notification-action {
            color: var(--accent);
        }
        
        .notification-action:hover {
            text-decoration: underline;
        }
        
        .no-notifications {
            padding: 2rem 1.2rem;
            text-align: center;
            color: var(--secondary);
            font-style: italic;
        }
        body[data-theme="dark"] .no-notifications {
            color: #a0a0a0;
        }
        .profile-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--secondary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            transition: transform 0.18s, box-shadow 0.18s;
            position: relative;
        }
        
        .profile-icon::before {
            content: attr(data-initial);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        
        .profile-online-status {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        
        .profile-online-status.online {
            background: #4caf50;
        }
        
        .profile-online-status.offline {
            background: #9e9e9e;
        }
        .profile-icon:hover {
            transform: scale(1.08) rotate(-8deg);
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        }
        .profile-label {
            color: inherit;
            font-size: 1.08rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            -webkit-user-select: none;
            user-select: none;
        }
        .profile-menu {
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            background: #fff;
            color: #222;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.13);
            min-width: 160px;
            z-index: 100;
            padding: 0.7rem 0;
            font-size: 1rem;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
        }
        .profile-menu.active {
            display: block;
        }
        body[data-theme="dark"] .profile-menu {
            background: #232a3a;
            color: #f7f8fa;
            box-shadow: 0 4px 24px rgba(0,0,0,0.28);
        }
        body[data-theme="dark"] .profile-menu .profile-menu-item {
            color: #f7f8fa;
        }
        .profile-menu-item {
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 1rem;
        }
        .profile-menu-item:hover {
            background: var(--sidebar-active-light);
            color: var(--primary);
        }
        body[data-theme="dark"] .profile-menu-item:hover {
            background: var(--sidebar-active-dark);
            color: var(--accent);
        }
        .layout {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }
        .sidebar {
            width: 210px;
            background: var(--sidebar-bg-light);
            border-right: 1.5px solid var(--sidebar-border-light);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-top: 2.2rem;
            z-index: 50;
            position: relative;
            min-width: 170px;
            box-sizing: border-box;
        }
        body[data-theme="dark"] .sidebar {
            background: var(--sidebar-bg-dark);
            border-right: 1.5px solid var(--sidebar-border-dark);
        }
        .sidebar .nav-item {
            width: 100%;
            padding: 0.9rem 2.2rem;
            color: var(--primary);
            font-size: 1.13rem;
            font-weight: 500;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            border-radius: 0 20px 20px 0;
            margin-bottom: 0.3rem;
            transition: background 0.18s, color 0.18s, transform 0.18s;
        }
        .sidebar .nav-item.active, .sidebar .nav-item:hover {
            background: var(--sidebar-active-light);
            color: var(--accent);
            transform: translateX(6px) scale(1.04);
        }
        body[data-theme="dark"] .sidebar .nav-item.active,
        body[data-theme="dark"] .sidebar .nav-item:hover {
            background: #2c3550;
            color: #C97FFD;
        }
        .sidebar .settings-block {
            margin-top: auto;
            width: 100%;
            padding: 1.1rem 2.2rem;
            border-top: 1.5px solid var(--sidebar-border-light);
            display: flex;
            align-items: center;
            color: var(--primary);
            font-size: 1.1rem;
            cursor: pointer;
            background: none;
            transition: background 0.18s, color 0.18s, transform 0.18s;
            box-sizing: border-box;
        }
        body[data-theme="dark"] .sidebar .settings-block {
            border-top: 1.5px solid var(--sidebar-border-dark);
        }
        .sidebar .settings-block:hover {
            background: var(--sidebar-active-light);
            color: var(--accent);
            transform: translateX(6px) scale(1.04);
            border-radius: 0 20px 20px 0;
        }
        body[data-theme="dark"] .sidebar .settings-block:hover {
            background: var(--sidebar-active-dark);
            color: var(--accent);
        }
        .main-content {
            flex: 1;
            padding: 2.5rem 2.5rem 2.5rem 2.5rem;
            min-width: 0;
            overflow-y: auto;
            position: relative;
            background: var(--main-content-light);
            border-radius: 0 0 0 0;
            box-shadow: none;
            color: var(--text-light);
        }
        body[data-theme="dark"] .main-content {
            background: var(--main-content-dark);
            color: var(--text-dark);
            box-shadow: none;
        }
        .section-title {
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            text-align: left;
            letter-spacing: 1px;
        }
        .placeholder {
            color: var(--accent);
            margin-top: 2rem;
            font-size: 1.13rem;
        }
        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            right: 2.2rem;
            bottom: 2.2rem;
            z-index: 100;
            background: #fff;
            color: #222;
            border: 2px solid var(--secondary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            cursor: pointer;
            transition: background 0.18s, color 0.18s, transform 0.18s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.08) rotate(-8deg);
        }
        body[data-theme="dark"] .theme-toggle {
            background: #232a3a;
            color: #f7f8fa;
            border: 2px solid var(--sidebar-border-dark);
        }
        @media (max-width: 900px) {
            .sidebar { width: 60px; padding-top: 1.2rem; }
            .sidebar .nav-item { padding: 0.9rem 0.7rem; font-size: 1.1rem; }
            .main-content { padding: 1.2rem 0.7rem; }
            .hubble-gradient { margin-left: 1rem; font-size: 1.3rem; }
            .profile-area { margin-right: 1rem; }
            .theme-toggle { right: 1rem; bottom: 1rem; }
            #profile-overlay { left: 60px; }
        }
        @media (max-width: 600px) {
            .layout { flex-direction: column; }
            .sidebar { flex-direction: row; width: 100vw; height: 60px; border-right: none; border-bottom: 1.5px solid var(--sidebar-border-light); padding: 0; }
            body[data-theme="dark"] .sidebar { border-bottom: 1.5px solid var(--sidebar-border-dark); }
            .sidebar .nav-item { flex: 1; border-radius: 0; text-align: center; margin-bottom: 0; }
            .sidebar .settings-block { display: none; }
            .main-content { padding: 1rem 0.2rem; }
            #profile-overlay { top: 116px; left: 0; }
            .profile-modal-header { padding: 1rem 1rem 0.5rem 1rem; }
            .profile-tab-content { padding: 0 1rem 1rem 1rem; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="topbar">
        <span class="hubble-gradient">Hubble</span>
        <input id="search-bar" class="search-bar-custom" type="text" placeholder="Search..." autocomplete="off" />
        <span class="profile-area">
            <span class="profile-label">Profile</span>
            <span class="profile-icon" id="profile-icon" title="Your Profile" data-initial="U">
                <div class="profile-online-status online"></div>
            </span>
            <div class="profile-menu" id="profile-menu">
                <button class="profile-menu-item">View Profile</button>
                <button class="profile-menu-item">Edit Profile</button>
                <button class="profile-menu-item">Logout</button>
            </div>
            <div class="notification-area">
                <span class="notification-icon" id="notification-icon" title="Notifications">🔔</span>
                <div class="notification-dropdown" id="notification-dropdown">
                    <div class="notification-header">
                        <h4>Notifications</h4>
                    </div>
                    <div class="notification-list" id="notification-list">
                        <div class="no-notifications">No new notifications</div>
                    </div>
                </div>
            </div>
        </span>
    </div>
    <div id="search-results-container" class="search-results-container" style="display:none;"></div>
    <div class="layout">
        <nav class="sidebar">
            <button class="nav-item active" id="nav-posts">Posts</button>
            <button class="nav-item" id="nav-shorts">Shorts</button>
            <button class="nav-item" id="nav-messages">Messages</button>
            <button class="nav-item" id="nav-games">Games</button>
            <div class="settings-block" id="nav-settings">⚙️ Settings</div>
        </nav>
        <main class="main-content" id="main-content">
            <!-- Section content will be injected here -->
        </main>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">🌙</button>
    <script>
        // Authentication check - redirect to index.html if not logged in or not verified
        async function checkAuth() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { app } = await import('./firebase.js');
                const auth = getAuth(app);
                
                auth.onAuthStateChanged(async (user) => {
                    if (!user) {
                        window.location.href = 'index.html';
                    } else {
                        // Check if email is verified
                        if (!user.emailVerified) {
                            // Sign out the user and redirect to verification
                            await auth.signOut();
                            window.location.href = 'index.html';
                            return;
                        }
                        
                        // Check if user exists in Firestore (completed registration)
                        try {
                            const { getFirestore, collection, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                            const db = getFirestore(app);
                            const userDoc = await getDocs(query(collection(db, "users"), where("email", "==", user.email)));
                            
                            if (userDoc.empty) {
                                // User doesn't exist in Firestore, sign them out
                                await auth.signOut();
                                window.location.href = 'index.html';
                                return;
                            }
                        } catch (error) {
                            console.error('Error checking user registration:', error);
                            await auth.signOut();
                            window.location.href = 'index.html';
                            return;
                        }
                        
                        // Initialize online status
                        initOnlineStatus();
                        
                        // Initialize URL routing
                        initURLRouting();
                    }
                });
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = 'index.html';
            }
        }
        
        // URL routing system
        function initURLRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const section = urlParams.get('section') || 'posts';
            
            // Update active navigation
            navItems.forEach(item => {
                if (item.section === section) {
                    document.getElementById(item.id).classList.add('active');
                } else {
                    document.getElementById(item.id).classList.remove('active');
                }
            });
            
            // Render the correct section
            renderSection(section);
            
            // Initialize section-specific features
            if (section === 'posts') {
                setTimeout(() => initPostsSection(), 100);
            } else if (section === 'messages') {
                setTimeout(() => initMessaging(), 100);
            }
        }
        
        function updateURL(section) {
            const url = new URL(window.location);
            url.searchParams.set('section', section);
            window.history.pushState({}, '', url);
        }
        
        // Run auth check immediately
        checkAuth();
        
        // Navigation logic
        const navItems = [
            { id: 'nav-posts', section: 'posts' },
            { id: 'nav-shorts', section: 'shorts' },
            { id: 'nav-messages', section: 'messages' },
            { id: 'nav-games', section: 'games' }
        ];
        let currentSection = 'posts';

        function setActiveNav(section) {
            navItems.forEach(item => {
                document.getElementById(item.id).classList.toggle('active', item.section === section);
            });
        }

        function renderSection(section) {
            currentSection = section;
            setActiveNav(section);
            let html = '';
            if (section === 'posts') {
                html = `
                    <div class="section-title">Posts</div>
                    <div id="auth-section" style="display:none;">
                        <div class="placeholder">Please sign in to post and view the feed.</div>
                    </div>
                    <div id="app-section" style="display:none;height:100%;display:flex;flex-direction:column;">
                        <div id="posts-feed" style="flex:1 1 auto;overflow-y:auto;padding-bottom:90px;"></div>
                        <form id="post-form" class="post-form-custom">
                            <div class="post-form-inner post-form-vertical">
                                <input id="post-title" maxlength="100" placeholder="Subject / Title" class="post-title-custom" />
                                <div class="post-textarea-wrapper">
                                    <textarea id="post-text" rows="1" maxlength="400" placeholder="What's on your mind?" class="post-textarea-custom"></textarea>
                                </div>
                                <div class="post-image-upload" id="post-image-upload" style="display: none;">
                                    <div class="post-image-preview" id="post-image-preview"></div>
                                    <button type="button" class="post-btn-custom" onclick="addPostImage()" style="margin-top: 0.5rem;">+ Add Image</button>
                                </div>
                                <div class="post-form-actions">
                                    <button type="button" class="post-action-btn" onclick="addPostImage()" title="Add Image">
                                        📷
                                    </button>
                                    <button class="post-btn-custom" type="submit">Post</button>
                                </div>
                            </div>
                        </form>
                    </div>
                `;
            } else if (section === 'shorts') {
                html = `
                    <div class="section-title">Hubble Shorts</div>
                    <div class="placeholder">Watch and post vertical video clips from your fellow students.<br><br><i>(Feature coming soon)</i></div>
                `;
            } else if (section === 'messages') {
                html = `
                    <div class="messages-container">
                        <div class="messages-sidebar">
                            <div class="messages-search">
                                <input type="text" placeholder="Search conversations..." id="messages-search-input">
                                <button class="new-message-btn" onclick="showNewMessageModal()">+</button>
                            </div>
                            <div class="conversations-list" id="conversations-list">
                                <div class="no-conversations">No conversations yet</div>
                            </div>
                            <div class="messages-help" style="padding: 1rem; border-top: 1px solid #e0e6f7; font-size: 0.8rem; color: #666;">

                const auth = getAuth(app);

                if (!user) return;

                if (postsListener) {

                        console.warn('Error cleaning up previous posts listener:', cleanupError);
                    }
                    postsListener = null;
                }
                
                // Set up real-time listener for posts
                postsListener = onSnapshot(query(
                    collection(db, 'posts'),
                    orderBy('timestamp', 'desc')
                ), async (snapshot) => {
                    const posts = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    // Fetch usernames for posts
                    for (const post of posts) {
                        if (!post.username) {

                                    post.username = userDoc.data().username || 'User';

                            } catch (error) {
                                post.username = 'User';
                            }
                        }
                    }
                    
                    await renderPostsFeed(posts);
                }, (error) => {

        function highlight(text, term) {
            if (!term) return text;
            return text.replace(new RegExp(`(${term.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\$&")})`, 'gi'), '<mark>$1</mark>');
            }
        
        async function showSearchResults(query) {
            if (!query || query.length < 1) {
                searchResultsContainer.style.display = 'none';
                searchResultsContainer.innerHTML = '';
                return;
            }
            
            await fetchAllPostsAndUsers();
            const term = query.trim();
            
            // Posts: match in title or text
            const postResults = (allPostsCache || []).filter(post =>
                (post.text && post.text.toLowerCase().includes(term.toLowerCase())) ||
                (post.title && post.title.toLowerCase().includes(term.toLowerCase()))
            ).slice(0, 5); // Limit to 5 results
            
            // Users: match in username
            const userResults = (allUsersCache || []).filter(user =>
                user.username && user.username.toLowerCase().includes(term.toLowerCase())
            ).slice(0, 3); // Limit to 3 results
            
            let html = '';
            
            if (postResults.length > 0) {
                html += '<div class="search-section-header">📢 Posts</div>';
                html += postResults.map(post => {
                    let preview = '';
                    let snippet = '';
                    
                    // Check title first
                    if (post.title && post.title.toLowerCase().includes(term.toLowerCase())) {
                        preview = highlight(post.title, term);
                    }
                    
                    // Check text content
                    if (post.text) {
                        const idx = post.text.toLowerCase().indexOf(term.toLowerCase());
                        if (idx !== -1) {
                            const start = Math.max(0, idx - 30);
                            const end = Math.min(post.text.length, idx + term.length + 30);
                            snippet = (start > 0 ? '...' : '') + post.text.substring(start, end) + (end < post.text.length ? '...' : '');
                            snippet = highlight(snippet, term);
                        }
                    }
                    
                    return `<div class="search-result-post">
                        <div class="search-result-content">
                            ${preview ? `<div class="search-result-title">${preview}</div>` : ''}
                            ${snippet ? `<div class="search-result-snippet">${snippet}</div>` : ''}
                        </div>
                        <div class="search-result-meta">by ${post.username || 'Unknown'}</div>
                    </div>`;
                }).join('');
            }
            
            if (userResults.length > 0) {
                html += '<div class="search-section-header">👤 Users</div>';
                html += userResults.map(user =>
                    `<div class="search-result-user" data-user-id="${user.id}" style="cursor: pointer;">
                        <div class="search-result-user-avatar">${user.username ? user.username[0].toUpperCase() : 'U'}</div>
                        <div class="search-result-user-info">
                            <div class="search-result-username">${highlight(user.username, term)}</div>
                            <div class="search-result-userid">${user.email || 'No email available'}</div>
                        </div>
                    </div>`
                ).join('');
            }
            
            if (!html) {
                html = '<div class="search-no-results">No results found for "' + term + '"</div>';
            }
            
            searchResultsContainer.innerHTML = html;
            searchResultsContainer.style.display = 'block';
            
            // Add click handlers for user search results
            const userResultElements = searchResultsContainer.querySelectorAll('.search-result-user');
            userResultElements.forEach(element => {
                element.addEventListener('click', async () => {
                    const userId = element.getAttribute('data-user-id');

        async function confirmPasswordChange() {
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                showCustomizationError('Please fill in all fields.');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showCustomizationError('New passwords do not match.');
                return;

            if (newPassword.length < 8) {
                showCustomizationError('New password must be at least 8 characters long.');
                return;
            }
            
            try {
                const { getAuth, reauthenticateWithCredential, EmailAuthProvider, updatePassword } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const user = auth.currentUser;
                
                // Re-authenticate user
                const credential = EmailAuthProvider.credential(user.email, currentPassword);
                await reauthenticateWithCredential(user, credential);
                
                // Update password
                await updatePassword(user, newPassword);
                
                closeCustomizationPopup();
                showCustomizationSuccess('Password changed successfully!');
            } catch (err) {
                let errorMessage = 'Failed to change password. Please try again.';
                
                if (err.code) {
                    switch (err.code) {
                        case 'auth/wrong-password':
                            errorMessage = 'Current password is incorrect.';
                            break;
                        case 'auth/weak-password':
                            errorMessage = 'New password is too weak. Please choose a stronger password.';
                            break;
                        case 'auth/requires-recent-login':
                            errorMessage = 'Please sign in again to change your password.';

                showCustomizationError(errorMessage);
                console.error('Password change error:', err);

        function setupNotifications() {
            const notificationIcon = document.getElementById('notification-icon');

            notificationIcon.addEventListener('click', async (e) => {

            profileIcon.addEventListener('click', (e) => {

                // Close notification dropdown if open
                notificationDropdown.classList.remove('active');
                // Toggle profile menu
                profileMenu.classList.toggle('active');
            });
            
            document.addEventListener('click', (e) => {
                if (!notificationDropdown.contains(e.target) && e.target !== notificationIcon) {

        // Load notifications from Firestore
        async function loadNotifications() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, query, where, orderBy, getDocs } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return;
                
                const notificationsSnap = await getDocs(query(
                    collection(db, 'notifications'),
                    where('userId', '==', currentUser.uid),
                    orderBy('timestamp', 'desc')
                ));
                
                const notifications = notificationsSnap.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                renderNotifications(notifications);
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }
        
        function renderNotifications(notifications) {
            const notificationList = document.getElementById('notification-list');
            const notificationIcon = document.getElementById('notification-icon');
            
            if (notifications.length === 0) {
                notificationList.innerHTML = '<div class="no-notifications">No new notifications</div>';
                notificationIcon.classList.remove('has-notifications');
                return;
            }
            
            // Show only unread notifications in dropdown
            const unreadNotifications = notifications.filter(n => !n.read);
            const recentNotifications = notifications.slice(0, 5); // Show last 5 notifications
            
            const notificationsToShow = unreadNotifications.length > 0 ? unreadNotifications : recentNotifications;
            
            notificationList.innerHTML = notificationsToShow.map(notification => `
                <div class="notification-item ${notification.read ? 'read' : 'unread'}" data-notification-id="${notification.id}">
                    <div class="notification-content">
                        <div class="notification-title">${notification.title}</div>
                        <div class="notification-message">${notification.message}</div>
                        <div class="notification-time">${notification.timestamp.toDate().toLocaleString()}</div>
                    </div>
                    ${notification.action ? `<div class="notification-action">${notification.action}</div>` : ''}
                    ${!notification.read ? '<div class="notification-dot"></div>' : ''}
                </div>
            `).join('') + `
                <div class="notification-view-all">
                    <button class="view-all-notifications-btn" onclick="showAllNotifications()">View All Notifications</button>
                </div>
            `;
            
            // Add click handlers for notifications
            notificationList.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', async () => {
                    const notificationId = item.dataset.notificationId;
                    const notification = notifications.find(n => n.id === notificationId);
                    
                    // Mark as read
                    await markNotificationAsRead(notificationId);
                    
                    // If it's a message notification, open the conversation
                    if (notification && notification.type === 'message' && notification.conversationId) {
                        // Close notification dropdown
                        document.getElementById('notification-dropdown').classList.remove('active');
                        
                        // Navigate to messages section
                        updateURL('messages');
                        renderSection('messages');
                        
                        // Wait for messaging to initialize, then open the conversation
                        setTimeout(async () => {
                            await initMessaging();
                            setTimeout(() => {
                                openChat(notification.conversationId, notification.senderId, notification.conversationName?.includes('Group'));
                            }, 200);
                        }, 100);
                    }
                });
            });
            
            // Add notification indicator if there are unread notifications
            const hasUnread = notifications.some(n => !n.read);
            if (hasUnread) {
                notificationIcon.classList.add('has-notifications');
            } else {
                notificationIcon.classList.remove('has-notifications');
            }
        }
        
        async function markNotificationAsRead(notificationId) {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                
                await updateDoc(doc(db, 'notifications', notificationId), {
                    read: true
                });
                
                // Update the UI
                const notificationItem = document.querySelector(`[data-notification-id="${notificationId}"]`);
                if (notificationItem) {
                    notificationItem.classList.remove('unread');
                    notificationItem.classList.add('read');
                    const dot = notificationItem.querySelector('.notification-dot');
                    if (dot) dot.remove();
                }
                
                // Reload notifications to update the indicator
                await loadNotifications();
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        // Online status management
        async function updateOnlineStatus() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, setDoc, onSnapshot, arrayUnion, arrayRemove, runTransaction } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const user = auth.currentUser;
                
                if (user) {
                    // Set user as online in their user document
                    await setDoc(doc(db, 'users', user.uid), {
                        online: true,
                        lastSeen: new Date()
                    }, { merge: true });
                    
                    // Add user to the online users list
                    await runTransaction(db, async (transaction) => {
                        const onlineUsersDoc = doc(db, 'onlineUsers', 'status');
                        const onlineUsersSnapshot = await transaction.get(onlineUsersDoc);
                        
                        if (onlineUsersSnapshot.exists()) {
                            const data = onlineUsersSnapshot.data();
                            const onlineUsersList = data.onlineUsers || [];
                            if (!onlineUsersList.includes(user.uid)) {
                                transaction.update(onlineUsersDoc, {
                                    onlineUsers: arrayUnion(user.uid),
                                    lastUpdated: new Date()
                                });
                            }
                        } else {
                            transaction.set(onlineUsersDoc, {
                                onlineUsers: [user.uid],
                                lastUpdated: new Date()
                            });
                        }
                    });
                    
                    // Listen for online users changes
                    const unsubscribe = onSnapshot(doc(db, 'onlineUsers', 'status'), (doc) => {
                        if (doc.exists()) {
                            const data = doc.data();
                            onlineUsers = new Set(data.onlineUsers || []);
                            updateOnlineStatusUI();
                        }
                    });
                    
                    // Set up periodic online status updates
                    const onlineStatusInterval = setInterval(async () => {
                        try {
                            await setDoc(doc(db, 'users', user.uid), {
                                online: true,
                                lastSeen: new Date()
                            }, { merge: true });
                        } catch (error) {
                            console.error('Error updating online status:', error);
                        }
                    }, 30000); // Update every 30 seconds
                    
                    // Cleanup on page unload
                    const cleanupOnlineStatus = async () => {
                        try {
                            // Remove user from online users list
                            await runTransaction(db, async (transaction) => {
                                const onlineUsersDoc = doc(db, 'onlineUsers', 'status');
                                const onlineUsersSnapshot = await transaction.get(onlineUsersDoc);
                                
                                if (onlineUsersSnapshot.exists()) {
                                    const data = onlineUsersSnapshot.data();
                                    const onlineUsersList = data.onlineUsers || [];
                                    if (onlineUsersList.includes(user.uid)) {
                                        transaction.update(onlineUsersDoc, {
                                            onlineUsers: arrayRemove(user.uid),
                                            lastUpdated: new Date()
                                        });
                                    }
                                }
                            });
                            
                            // Set user as offline
                            await setDoc(doc(db, 'users', user.uid), {
                                online: false,
                                lastSeen: new Date()
                            }, { merge: true });
                            
                            clearInterval(onlineStatusInterval);
                        } catch (error) {
                            console.error('Error cleaning up online status:', error);
                        }
                    };
                    
                    window.addEventListener('beforeunload', cleanupOnlineStatus);
                    window.addEventListener('pagehide', cleanupOnlineStatus);
                    
                    // Store cleanup function for manual cleanup
                    window.cleanupOnlineStatus = cleanupOnlineStatus;
                }
            } catch (error) {
                console.error('Error updating online status:', error);
            }
        }

        async function loadAllConversations() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, query, where, getDocs, orderBy, getDoc, doc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const user = auth.currentUser;
                
                if (!user) return;
                
                // Get all user's conversations
                const conversationsSnap = await getDocs(query(
                    collection(db, 'conversations'),
                    where('participants', 'array-contains', user.uid)
                ));
                
                const conversations = conversationsSnap.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                // Clean up duplicate conversations before processing
                const cleanedConversations = await cleanupDuplicateConversationsInMemory(conversations, user.uid);
                
                // Sort conversations by lastMessageTime (newest first)
                cleanedConversations.sort((a, b) => {
                    const timeA = a.lastMessageTime?.toDate?.() || a.lastMessageTime || new Date(0);
                    const timeB = b.lastMessageTime?.toDate?.() || b.lastMessageTime || new Date(0);
                    return timeB - timeA;
                });
                
                // Fetch usernames for 1-to-1 conversations
                for (const conv of cleanedConversations) {
                    if (conv.type === '1to1') {
                        const otherUserId = conv.participants.find(p => p !== user.uid);
                        if (otherUserId) {
                            try {
                                const otherUserDoc = await getDoc(doc(db, 'users', otherUserId));
                                if (otherUserDoc.exists()) {
                                    conv.otherUsername = otherUserDoc.data().username || 'User';
                                } else {
                                    conv.otherUsername = 'User';
                                }
                            } catch (error) {
                                console.error('Error fetching username for user:', otherUserId, error);
                                conv.otherUsername = 'User';
                            }
                        }
                    }
                }
                
                console.log('Loaded conversations:', cleanedConversations);
                await renderAllConversations(cleanedConversations);
            } catch (error) {
                console.error('Error loading conversations:', error);
            }
        }

        async function startNewChat() {
            if (selectedUsers.length === 0) return;
            
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, addDoc, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                const participants = [currentUser.uid, ...selectedUsers.map(u => u.id)];
                const type = selectedUsers.length === 1 ? '1to1' : 'group';
                const name = selectedUsers.length === 1 ? null : `Group: ${selectedUsers.map(u => u.username).join(', ')}`;
                
                // Check privacy settings for each user
                for (const user of selectedUsers) {
                    const canMessage = await checkUserPrivacySettings(user.id);
                    if (!canMessage.allowed) {
                        // Send notification to the user
                        await sendPrivacyNotification(user.id, canMessage.reason);
                        showCustomizationError(`Cannot message ${user.username}: ${canMessage.reason}`);
                        return;
                    }
                }
                
                // Check for existing conversations to prevent duplicates
                if (type === 'group') {
                    // For group chats, check if there are any existing 1-to-1 conversations between the participants
                    // that might cause confusion
                    const existing1to1Conversations = [];
                    for (const participant of participants) {
                        if (participant !== currentUser.uid) {
                            const existingConv = await getDocs(query(
                                collection(db, 'conversations'),
                                where('participants', 'array-contains', currentUser.uid),
                                where('type', '==', '1to1')
                            ));
                            
                            for (const doc of existingConv.docs) {
                                const data = doc.data();
                                if (data.participants.includes(participant) && data.participants.length === 2) {
                                    existing1to1Conversations.push({ id: doc.id, ...data });
                                }
                            }
                        }
                    }
                    
                    if (existing1to1Conversations.length > 0) {
                        console.log('Found existing 1-to-1 conversations with group participants:', existing1to1Conversations);
                        // We'll keep these existing conversations but make sure they don't interfere with the group chat
                    }
                }
                
                // Create conversation
                const convRef = await addDoc(collection(db, 'conversations'), {
                    participants: participants,
                    type: type,
                    name: name,
                    createdAt: new Date(),
                    lastMessage: '',
                    lastMessageTime: new Date(),
                    createdBy: currentUser.uid
                });
                
                console.log('Created conversation:', convRef.id, { participants, type, name });
                
                // Store the selected users before clearing them
                const selectedUsersCopy = [...selectedUsers];
                
                closeCustomizationPopup();
                selectedUsers = [];
                
                // Refresh the conversations list to show the new chat
                await loadAllConversations();
                
                // Open the new chat
                openChat(convRef.id, selectedUsersCopy.length === 1 ? selectedUsersCopy[0].id : null, type === 'group');
                
            } catch (error) {
                console.error('Error creating chat:', error);
                showCustomizationError('Failed to create chat');
            }
        }
        
        async function checkUserPrivacySettings(userId) {
            try {
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                const db = getFirestore(app);
                
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const privacy = userData.messagePrivacy || 'everyone';
                    
                    if (privacy === 'none') {
                        return { allowed: false, reason: 'User is not accepting messages' };
                    } else if (privacy === 'friends') {
                        const isFriend = await checkFriendship(userId);
                        if (!isFriend) {
                            return { allowed: false, reason: 'User only accepts messages from friends' };
                        }
                    } else if (privacy === 'followers') {
                        const isFollower = await checkFollowerStatus(userId);
                        if (!isFollower) {
                            return { allowed: false, reason: 'User only accepts messages from followers' };
                        }
                    }
                    
                    return { allowed: true };
                }
                
                return { allowed: false, reason: 'User not found' };
            } catch (error) {
                console.error('Error checking privacy settings:', error);
                return { allowed: false, reason: 'Error checking privacy settings' };
            }
        }

                });
            } catch (error) {

            }
        }
        
        // Helper functions for privacy checks
        async function checkFriendship(userId) {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return false;
                
                const currentUserDoc = await getDoc(doc(db, 'users', currentUser.uid));
                const targetUserDoc = await getDoc(doc(db, 'users', userId));
                
                if (!currentUserDoc.exists() || !targetUserDoc.exists()) return false;
                
                const currentUserData = currentUserDoc.data();
                const targetUserData = targetUserDoc.data();
                
                const currentFollowing = Array.isArray(currentUserData.following) ? currentUserData.following : [];
                const targetFollowing = Array.isArray(targetUserData.following) ? targetUserData.following : [];
                
                // Check if they follow each other (mutual follow)
                return currentFollowing.includes(userId) && targetFollowing.includes(currentUser.uid);
            } catch (error) {
                console.error('Error checking friendship:', error);
                return false;
            }
        }
        
        async function checkFollowerStatus(userId) {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return false;
                
                const targetUserDoc = await getDoc(doc(db, 'users', userId));
                
                if (targetUserDoc.exists()) {
                    const targetUserData = targetUserDoc.data();
                    const targetFollowers = targetUserData.followers || [];
                    
                    // Check if current user is a follower of the target user
                    return targetFollowers.includes(currentUser.uid);
                }
                
                return false;
            } catch (error) {
                console.error('Error checking follower status:', error);
                return false;
            }
        }
        
        // Spam Protection Functions
        async function checkSpamProtection() {
            const now = Date.now();
            
            // Check if user is in timeout
            if (spamTimeout > now) {
                const remainingTime = Math.ceil((spamTimeout - now) / 1000);
                showCustomizationError(`You are temporarily blocked from posting. Try again in ${remainingTime} seconds.`);
                return false;
            }
            
            // Check post frequency
            if (now - lastPostTime < 30000) { // 30 seconds between posts
                userPostCount++;
                if (userPostCount >= 3) { // 3 posts in 30 seconds = spam
                    spamViolations++;
                    const timeoutDuration = Math.min(spamViolations * 300000, 3600000); // 5 min to 1 hour
                    spamTimeout = now + timeoutDuration;
                    
                    showCustomizationError(`Spam detected. You are blocked for ${Math.ceil(timeoutDuration / 60000)} minutes.`);
                    
                    // If 3 violations, notify admin
                    if (spamViolations >= 3) {
                        await notifyAdminOfSpam();
                    }
                    
                    return false;
                }
            } else {
                // Reset counter if enough time has passed
                userPostCount = 1;
            }
            
            lastPostTime = now;
            return true;
        }

            try {

            } catch (error) {

            }
        }

        async function loadChatMessages(conversationId) {
            try {
                const { getFirestore, collection, query, orderBy, onSnapshot } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                const db = getFirestore(app);
                
                // Clear any existing listener
                if (messageListener) {

                        messageListener();
                    } catch (cleanupError) {
                        console.warn('Error cleaning up previous listener:', cleanupError);
                    }
                    messageListener = null;
                }
                
                // Validate conversationId
                if (!conversationId || typeof conversationId !== 'string') {
                    console.error('Invalid conversationId:', conversationId);
                    return;
                }
                
                // Set up real-time listener for messages
                messageListener = onSnapshot(query(
                    collection(db, 'conversations', conversationId, 'messages'),
                    orderBy('timestamp', 'asc')
                ), (snapshot) => {
                    try {
                        const messages = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        renderMessages(messages);
                    } catch (renderError) {
                        console.error('Error rendering messages:', renderError);
                    }
                }, (error) => {
                    console.error('Error listening to messages:', error);
                    // Don't throw the error, just log it to prevent crashes
                });
                
            } catch (error) {

        async function renderMessages(messages) {
            const chatMessages = document.getElementById('chat-messages');
            if (!chatMessages) return;
            
            // Get current user
            const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
            const { app } = await import('./firebase.js');
            const auth = getAuth(app);
            const currentUser = auth.currentUser;
            
            // Check if we should auto-scroll (if user is near bottom or if it's a new message)
            const isNearBottom = chatMessages.scrollTop + chatMessages.clientHeight >= chatMessages.scrollHeight - 100;
            const isNewMessage = messages.length > 0 && currentChat && messages[messages.length - 1].senderId !== currentUser?.uid;
            
            chatMessages.innerHTML = messages.map(message => {
                const isSent = message.senderId === currentUser.uid;
                const isUnsent = message.unsent;
                const timestamp = message.timestamp?.toDate?.() || message.timestamp || new Date();
                const canEdit = !isUnsent && Date.now() - timestamp.getTime() < 15 * 60 * 1000; // 15 minutes
                const canUnsend = !isUnsent && Date.now() - timestamp.getTime() < 2 * 60 * 1000; // 2 minutes
                
                if (isUnsent) {
                    return `
                        <div class="unsent-message">
                            ${message.senderId === currentUser.uid ? 'You unsent a message' : `${message.senderName} unsent a message`}
                        </div>
                    `;
                }
                
                // Handle filtered content
                let messageContent = message.text;
                if (message.filtered && !isSent) {
                    messageContent = `<span class="filtered-content" style="filter: blur(2px);">${message.text}</span>`;
                }
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}" data-message-id="${message.id}">
                        <div class="message-content">${messageContent}</div>
                        <div class="message-time">${timestamp.toLocaleTimeString()}</div>
                        ${isSent ? `
                            <div class="read-receipts">
                                <span class="receipt ${message.status}">${getReceiptIcon(message.status)}</span>
                            </div>
                        ` : ''}
                        ${isSent ? `
                            <div class="message-actions">
                                ${canEdit ? `<button class="message-action edit" onclick="editMessage('${message.id}')">Edit</button>` : ''}
                                ${canUnsend ? `<button class="message-action unsend" onclick="unsendMessage('${message.id}')">Unsend</button>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // Auto-scroll to bottom if user is near bottom or if it's a new message
            if (isNearBottom || isNewMessage) {
                setTimeout(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 100);
            }
        }
        
        function getReceiptIcon(status) {
            switch (status) {
                case 'sent': return '✓';
                case 'delivered': return '✓✓';
                case 'read': return '✓✓';

        async function sendMessage(conversationId) {
            const chatInput = document.getElementById('chat-input');

            if (!text || !currentChat) return;
            
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, addDoc, updateDoc, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const user = auth.currentUser;
                
                // Check privacy settings
                const convDoc = await getDoc(doc(db, 'conversations', conversationId));
                if (convDoc.exists()) {
                    const convData = convDoc.data();
                    if (convData.type === '1to1') {
                        const otherUserId = convData.participants.find(p => p !== user.uid);
                        const otherUserDoc = await getDoc(doc(db, 'users', otherUserId));
                        if (otherUserDoc.exists()) {
                            const otherUserData = otherUserDoc.data();
                            if (otherUserData.messagePrivacy === 'friends' && !isFriend(otherUserId)) {
                                showCustomizationError('This user only accepts messages from friends');
                                return;
                            } else if (otherUserData.messagePrivacy === 'followers' && !isFollower(otherUserId)) {
                                showCustomizationError('This user only accepts messages from followers');
                                return;
                            } else if (otherUserData.messagePrivacy === 'none') {
                                showCustomizationError('This user is not accepting messages');
                                return;
                            }
                        }
                    }
                }
                
                // Apply content filtering
                const filteredText = await filterContent(text, user.uid);
                
                // Get user's username from Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const username = userDoc.exists() ? userDoc.data().username : 'User';
                
                // Add message to subcollection
                const messageRef = await addDoc(collection(db, 'conversations', conversationId, 'messages'), {
                    senderId: user.uid,
                    senderName: username,
                    text: filteredText,
                    originalText: text,
                    filtered: text !== filteredText,
                    timestamp: new Date(),
                    status: 'sent',
                    unsent: false
                });
                
                // Update conversation - only update the specific conversation this message was sent to
                await updateDoc(doc(db, 'conversations', conversationId), {
                    lastMessage: filteredText,
                    lastMessageTime: new Date()
                });
                
                // Create notifications for other participants
                await createMessageNotifications(conversationId, user.uid, username, filteredText, convData);
                
                // Clear input
                chatInput.value = '';
                
            } catch (error) {
                console.error('Error sending message:', error);

        async function filterContent(text, userId) {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return text;
                
                // Get current user's filtering preferences
                const currentUserDoc = await getDoc(doc(db, 'users', currentUser.uid));
                if (!currentUserDoc.exists()) return text;
                
                const userData = currentUserDoc.data();
                const chatFiltering = userData.chatFiltering || 'none';
                
                // Always show the message, just potentially blur sensitive content
                if (chatFiltering === 'none') {
                    return text; // No filtering
                }
                
                if (chatFiltering === 'all') {
                    return filterSensitiveContent(text); // Filter all sensitive content
                }
                
                if (chatFiltering === 'friends') {
                    // Check if sender is a friend
                    const isFriend = await isFriend(userId);
                    if (isFriend) {
                        return text; // Don't filter friends
                    } else {
                        return filterSensitiveContent(text); // Filter non-friends
                    }
                }
                
                return text;
            } catch (error) {
                console.error('Error filtering content:', error);
                return text; // Always return the message, even if filtering fails
            }
        }
        
        function filterSensitiveContent(text) {
            // Simple content filtering - can be expanded
            const sensitiveWords = ['badword1', 'badword2', 'inappropriate'];
            let filteredText = text;
            
            sensitiveWords.forEach(word => {
                const regex = new RegExp(word, 'gi');
                filteredText = filteredText.replace(regex, '*'.repeat(word.length));
            });
            
            return filteredText;
        }
        
        async function isFriend(userId) {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return false;
                
                // Get both users' data
                const [currentUserDoc, targetUserDoc] = await Promise.all([
                    getDoc(doc(db, 'users', currentUser.uid)),
                    getDoc(doc(db, 'users', userId))
                ]);
                
                if (!currentUserDoc.exists() || !targetUserDoc.exists()) return false;
                
                const currentUserData = currentUserDoc.data();
                const targetUserData = targetUserDoc.data();
                
                // Check mutual follow (friendship)
                const currentUserFollowing = Array.isArray(currentUserData.following) ? currentUserData.following : [];
                const targetUserFollowing = Array.isArray(targetUserData.following) ? targetUserData.following : [];
                
                return currentUserFollowing.includes(userId) && targetUserFollowing.includes(currentUser.uid);
            } catch (error) {
                console.error('Error checking friendship:', error);
                return false;
            }
        }

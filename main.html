        // Function to clean up duplicate conversations in memory (for display purposes)
        async function cleanupDuplicateConversationsInMemory(conversations, currentUserId) {
            // Group conversations by participant pairs for 1-to-1 conversations
            const conversationGroups = {};
            const groupConversations = [];
            
            conversations.forEach(conv => {
                if (conv.type === 'group') {
                    groupConversations.push(conv);
                } else if (conv.type === '1to1') {
                    const otherUser = conv.participants.find(p => p !== currentUserId);
                    const key = [currentUserId, otherUser].sort().join('-');
                    
                    if (!conversationGroups[key]) {
                        conversationGroups[key] = [];
                    }
                    conversationGroups[key].push(conv);
                }
            });
            
            // For each group of duplicate 1-to-1 conversations, keep only the one with the most recent message
            const cleaned1to1Conversations = [];
            for (const [key, convs] of Object.entries(conversationGroups)) {
                if (convs.length === 1) {
                    cleaned1to1Conversations.push(convs[0]);
                } else {
                    // Sort by lastMessageTime and keep the most recent one
                    convs.sort((a, b) => {
                        const timeA = a.lastMessageTime?.toDate?.() || a.lastMessageTime || new Date(0);
                        const timeB = b.lastMessageTime?.toDate?.() || b.lastMessageTime || new Date(0);
                        return timeB - timeA;
                    });
                    cleaned1to1Conversations.push(convs[0]);
                }
            }
            
            // Return all group conversations plus the cleaned 1-to-1 conversations
            return [...groupConversations, ...cleaned1to1Conversations];
        }
        
        // Function to clean up duplicate conversations (can be called manually)
        async function cleanupDuplicateConversations() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, query, where, getDocs, deleteDoc, doc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return;
                
                // Get all user's conversations
                const conversationsSnap = await getDocs(query(
                    collection(db, 'conversations'),
                    where('participants', 'array-contains', currentUser.uid),
                    where('type', '==', '1to1')
                ));
                
                const conversations = conversationsSnap.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                // Group conversations by participant pairs
                const conversationGroups = {};
                conversations.forEach(conv => {
                    const otherUser = conv.participants.find(p => p !== currentUser.uid);
                    const key = [currentUser.uid, otherUser].sort().join('-');
                    
                    if (!conversationGroups[key]) {
                        conversationGroups[key] = [];
                    }
                    conversationGroups[key].push(conv);
                });
                
                // Delete duplicates (keep the oldest one)
                let deletedCount = 0;
                for (const [key, convs] of Object.entries(conversationGroups)) {
                    if (convs.length > 1) {
                        // Sort by creation time, keep the oldest
                        convs.sort((a, b) => {
                            const timeA = a.createdAt?.toDate?.() || a.createdAt || new Date(0);
                            const timeB = b.createdAt?.toDate?.() || b.createdAt || new Date(0);
                            return timeA - timeB;
                        });
                        
                        // Delete all except the first (oldest) one
                        for (let i = 1; i < convs.length; i++) {
                            await deleteDoc(doc(db, 'conversations', convs[i].id));
                            deletedCount++;
                        }
                    }
                }
                
                if (deletedCount > 0) {
                    showCustomizationSuccess(`Cleaned up ${deletedCount} duplicate conversations`);
                    // Refresh conversations list
                    await loadAllConversations();
                } else {
                    showCustomizationSuccess('No duplicate conversations found');
                }
                
            } catch (error) {
                console.error('Error cleaning up duplicate conversations:', error);
                showCustomizationError('Failed to clean up duplicates');
            }
        }

                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, query, where, getDocs, updateDoc, doc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return;
                
                // Get all unread notifications for this conversation
                const notificationsSnap = await getDocs(query(
                    collection(db, 'notifications'),
                    where('userId', '==', currentUser.uid),
                    where('conversationId', '==', conversationId),
                    where('read', '==', false)
                ));
                
                // Mark them as read
                const updatePromises = notificationsSnap.docs.map(doc => 
                    updateDoc(doc.ref, { read: true })
                );
                
                await Promise.all(updatePromises);
                
            } catch (error) {
                console.error('Error marking conversation notifications as read:', error);
            }
        }
        
        // Create notifications for new messages
        async function createMessageNotifications(conversationId, senderId, senderName, messageText, conversationData) {
            try {
                const { getFirestore, collection, addDoc, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                const db = getFirestore(app);
                
                // Get conversation participants (excluding the sender)
                const participants = conversationData.participants.filter(p => p !== senderId);
                
                // Create notifications for each participant
                for (const participantId of participants) {
                    // Check if user is currently viewing this conversation
                    const isCurrentlyViewing = currentChat === conversationId;
                    
                    // Only create notification if user is not currently viewing the conversation
                    if (!isCurrentlyViewing) {
                        // Get conversation name for notification
                        let conversationName = 'Chat';
                        if (conversationData.type === 'group') {
                            conversationName = conversationData.name || 'Group Chat';
                        } else {
                            // For 1-to-1 chats, get the other user's name
                            const participantDoc = await getDoc(doc(db, 'users', participantId));
                            if (participantDoc.exists()) {
                                conversationName = participantDoc.data().username || 'User';
                            }
                        }
                        
                        // Create notification
                        await addDoc(collection(db, 'notifications'), {
                            userId: participantId,
                            type: 'message',
                            title: `New message from ${senderName}`,
                            message: messageText.length > 50 ? messageText.substring(0, 50) + '...' : messageText,
                            conversationId: conversationId,
                            conversationName: conversationName,
                            senderId: senderId,
                            senderName: senderName,
                            timestamp: new Date(),
                            read: false
                        });
                    }
                }
            } catch (error) {
                console.error('Error creating message notifications:', error);
            }
        }
        
        // Real-time notification listener
        let notificationListener = null;
        
        async function setupNotificationListener() {
            try {
                const { getAuth } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js');
                const { getFirestore, collection, query, where, orderBy, onSnapshot } = await import('https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js');
                const { app } = await import('./firebase.js');
                
                const auth = getAuth(app);
                const db = getFirestore(app);
                const currentUser = auth.currentUser;
                
                if (!currentUser) return;
                
                // Clear any existing listener
                if (notificationListener) {
                    try {
                        notificationListener();
                    } catch (cleanupError) {
                        console.warn('Error cleaning up previous notification listener:', cleanupError);
                    }
                    notificationListener = null;
                }
                
                // Set up real-time listener for notifications
                notificationListener = onSnapshot(query(
                    collection(db, 'notifications'),
                    where('userId', '==', currentUser.uid),
                    orderBy('timestamp', 'desc')
                ), (snapshot) => {
                    const notifications = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    renderNotifications(notifications);
                    
                    // Show notification badge if there are unread notifications
                    const hasUnread = notifications.some(n => !n.read);
                    const notificationIcon = document.getElementById('notification-icon');
                    if (notificationIcon) {
                        if (hasUnread) {
                            notificationIcon.classList.add('has-notifications');
                        } else {
                            notificationIcon.classList.remove('has-notifications');
                        }
                    }
                    
                    // Show browser notification for new unread notifications
                    const newNotifications = notifications.filter(n => !n.read && n.timestamp?.toDate?.() > new Date(Date.now() - 10000)); // Last 10 seconds
                    for (const notification of newNotifications) {
                        if (notification.type === 'message' && document.hidden) {
                            showBrowserNotification(notification);
                        }
                    }
                }, (error) => {
                    console.error('Error listening to notifications:', error);
                });
                
            } catch (error) {
                console.error('Error setting up notification listener:', error);
            }
        }
